<!DOCTYPE html>
<html lang="zh-CN">


<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown 转 HTML 测试 · JK</title>
    <meta name="description" content="使用 marked.js 在浏览器中将 Markdown 实时转换为 HTML。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../main.css">
    <style>
        .markdown-tool {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .markdown-panel h2 {
            font-size: 1rem;
            margin-bottom: 0.8rem;
        }

        .markdown-input,
        .html-output {
            width: 100%;
            min-height: 420px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            line-height: 1.7;
        }

        .markdown-input {
            resize: vertical;
            color: var(--text);
            background: var(--bg-subtle);
            caret-color: auto;
            cursor: text !important;
        }

        .markdown-preview {
            min-height: 420px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            background: #fff;
        }

        .markdown-preview h1,
        .markdown-preview h2,
        .markdown-preview h3 {
            margin: 1rem 0 0.6rem;
            line-height: 1.35;
        }

        .markdown-preview p,
        .markdown-preview li {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .markdown-preview ul,
        .markdown-preview ol {
            padding-left: 1.2rem;
            margin: 1rem 0;
        }

        .markdown-preview pre {
            background: #161616;
            border-radius: var(--radius);
            overflow-x: auto;
            padding: 1rem;
            margin: 1.2rem 0;
        }

        .markdown-preview pre code {
            color: #eeeeee;
        }

        .html-output {
            min-height: 220px;
            overflow: auto;
            white-space: pre-wrap;
            background: #161616;
            color: #eeeeee;
        }

        @media (max-width: 760px) {
            .markdown-tool {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body data-base="../../">
    <div data-include="header"></div>

    <main class="article-page">
        <article class="article-content">
            <header class="article-header">
                <a class="article-back" href="../../index.html#articles">← 返回文章列表</a>
                <div class="article-meta">
                    <span class="tag">marked.js</span>
                    <span class="tag">Markdown</span>
                    <time>2026-05-02</time>
                </div>
                <h1>Markdown 转 HTML 测试</h1>
                <p>这个页面使用 marked.js 在浏览器中把 Markdown 实时转换成 HTML，适合快速预览文章内容。</p>
            </header>

            <div class="markdown-tool">
                <section class="markdown-panel">
                    <h2>Markdown 输入</h2>
                    <textarea id="markdown-input" class="markdown-input" spellcheck="false"># Unreal 数字孪生客户端

这是一段 **Markdown** 示例文本。

## 功能列表

- 场景模型加载
- 实时数据接入
- 告警状态展示

```js
const title = "Markdown to HTML";
console.log(title);
```
</textarea>
                </section>

                <section class="markdown-panel">
                    <h2>HTML 预览</h2>
                    <div id="markdown-preview" class="markdown-preview"></div>
                </section>
            </div>

            <section class="markdown-panel">
                <h2>转换后的 HTML 源码</h2>
                <pre id="html-output" class="html-output"></pre>
            </section>
        </article>
    </main>

    <div data-include="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../../index.js"></script>
    <script src="../../includes.js"></script>
    <script>
        const input = document.getElementById("markdown-input");
        const preview = document.getElementById("markdown-preview");
        const output = document.getElementById("html-output");

        marked.use({
            gfm: true,
            breaks: true,
        });

        function renderMarkdown() {
            const html = marked.parse(input.value);
            preview.innerHTML = html;
            output.textContent = html.trim();
        }

        input.addEventListener("input", renderMarkdown);
        renderMarkdown();
    </script>
</body>

</html>
